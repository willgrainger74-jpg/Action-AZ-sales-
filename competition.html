<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competition — Action Plumbing</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--red:#dc2626;--red2:#991b1b;--red3:#450a0a;--bg:#080808;--s1:#111;--s2:#181818;--s3:#202020;--wire:rgba(255,255,255,0.06);--wire2:rgba(255,255,255,0.10);--wire3:rgba(255,255,255,0.18);--muted:#aaa;--faint:#666;--text:#efefef;--green:#16a34a;--amber:#d97706;--t1:#1d4ed8;--t2:#15803d;--t3:#b45309}
        html{scroll-behavior:smooth}body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
        body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:999}
        .page{max-width:1320px;margin:0 auto;padding:24px 20px 60px}
        .pg-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--wire);gap:16px;flex-wrap:wrap}
        .pg-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,5vw,60px);line-height:.95;letter-spacing:2px}.pg-title em{font-style:normal;color:var(--red)}
        .pg-sub{font-family:'Oswald',sans-serif;font-size:13px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:4px}
        .back-btn{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border:1px solid var(--wire2);padding:9px 16px;text-decoration:none;transition:all .15s;white-space:nowrap;align-self:flex-start}.back-btn:hover{color:var(--text);border-color:var(--muted)}
        .card{background:var(--s1);border:1px solid var(--wire);padding:24px 28px;margin-bottom:20px}
        .card-inner{background:var(--s2);border:1px solid var(--wire);padding:16px 18px;margin-bottom:10px}
        .month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
        .month-nav h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px}
        .sec-label{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}.sec-label::after{content:'';flex:1;height:1px;background:var(--wire)}
        .sec-title-lg{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;color:var(--text);margin-bottom:16px}
        input[type=text],input[type=number],select,textarea{background:var(--s3);border:1px solid var(--wire2);color:var(--text);padding:9px 12px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s;width:100%}
        input::placeholder{color:var(--muted)}input:focus,select:focus{border-color:var(--red)}select option{background:var(--s2);color:var(--text)}
        .btn{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:9px 18px;border:none;cursor:pointer;transition:all .15s}
        .btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red2)}.btn-red:active{transform:scale(.97)}
        .btn-outline{background:transparent;color:var(--muted);border:1px solid var(--wire2)}.btn-outline:hover{color:var(--text);border-color:var(--muted)}
        .btn-save{background:var(--s3);border:1px solid var(--wire2);color:var(--text);font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:12px;cursor:pointer;width:100%;transition:all .15s;margin-top:16px}.btn-save:hover{border-color:var(--red);color:var(--red)}
        .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;background:var(--wire)}
        .g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:2px;background:var(--wire)}
        @media(max-width:900px){.g3{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}}
        @media(max-width:520px){.g4{grid-template-columns:1fr}}
        /* team setup */
        .team-setup-block{background:var(--s2);border:1px solid var(--wire);padding:20px;position:relative}
        .team-setup-block::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
        .team1::before{background:var(--t1)}.team2::before{background:var(--t2)}.team3::before{background:var(--t3)}
        .team-label{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
        .team1 .team-label{color:#93c5fd}.team2 .team-label{color:#86efac}.team3 .team-label{color:#fcd34d}
        .field-lbl{font-family:'Oswald',sans-serif;font-size:12px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block}
        .add-tm-btn{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border:1px solid var(--wire2);padding:5px 12px;background:transparent;cursor:pointer;margin-top:8px;transition:all .15s}.add-tm-btn:hover{color:var(--text);border-color:var(--muted)}
        .tm-row{display:flex;gap:6px;margin-top:5px}
        .tm-row select{flex:1}
        .tm-remove{font-family:'Oswald',sans-serif;font-size:13px;background:transparent;border:1px solid var(--wire2);color:var(--muted);padding:0 10px;cursor:pointer;transition:all .15s;flex-shrink:0}.tm-remove:hover{color:var(--red);border-color:rgba(220,38,38,.3)}
        /* standings */
        .standings-card{background:var(--s2);border:1px solid var(--wire);padding:20px;margin-bottom:8px;position:relative;overflow:hidden}
        .standings-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
        .sc-t1::before{background:var(--t1)}.sc-t2::before{background:var(--t2)}.sc-t3::before{background:var(--t3)}
        .standings-card.leader{border-color:var(--wire3)}
        .sc-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--text)}
        .sc-rev{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:2px;line-height:1}
        .sc-t1 .sc-rev{color:#93c5fd}.sc-t2 .sc-rev{color:#86efac}.sc-t3 .sc-rev{color:#fcd34d}
        .pts-badge{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 12px;border:1px solid}
        .sc-t1 .pts-badge{color:#93c5fd;border-color:rgba(147,197,253,.3)}.sc-t2 .pts-badge{color:#86efac;border-color:rgba(134,239,172,.3)}.sc-t3 .pts-badge{color:#fcd34d;border-color:rgba(252,211,77,.3)}
        .mini-stat{background:var(--s3);border:1px solid var(--wire);padding:10px 12px;text-align:center}
        .mini-stat .lbl{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
        .mini-stat .val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--text)}
        /* category winners */
        .cat-card{background:var(--s2);border:1px solid var(--wire);padding:16px;text-align:center}
        .cat-label{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
        .cat-val{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--text);margin-bottom:4px}
        .cat-team{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
    </style>
</head>
<body>
<div class="page">
    <div class="pg-header">
        <div><div class="pg-title">Team <em>Competition</em></div><div class="pg-sub">Monthly standings</div></div>
        <a href="index.html" class="back-btn">← Dashboard</a>
    </div>
    <div class="card">
        <div class="month-nav">
            <button class="btn btn-red" id="prevMonth">←</button>
            <h2 id="monthYear"></h2>
            <button class="btn btn-red" id="nextMonth">→</button>
        </div>
        <!-- Team Setup -->
        <div class="sec-label">Team Setup</div>
        <div class="g3" style="margin-bottom:16px">
            <div class="team-setup-block team1">
                <div class="team-label">Team 1</div>
                <label class="field-lbl">Captain</label>
                <select id="captain1" style="margin-bottom:10px"><option value="">Select captain…</option></select>
                <label class="field-lbl">Teammates</label>
                <div id="teammates1"></div>
                <button class="add-tm-btn" onclick="addTeammate(1)">+ Add Teammate</button>
            </div>
            <div class="team-setup-block team2">
                <div class="team-label">Team 2</div>
                <label class="field-lbl">Captain</label>
                <select id="captain2" style="margin-bottom:10px"><option value="">Select captain…</option></select>
                <label class="field-lbl">Teammates</label>
                <div id="teammates2"></div>
                <button class="add-tm-btn" onclick="addTeammate(2)">+ Add Teammate</button>
            </div>
            <div class="team-setup-block team3">
                <div class="team-label">Team 3</div>
                <label class="field-lbl">Captain</label>
                <select id="captain3" style="margin-bottom:10px"><option value="">Select captain…</option></select>
                <label class="field-lbl">Teammates</label>
                <div id="teammates3"></div>
                <button class="add-tm-btn" onclick="addTeammate(3)">+ Add Teammate</button>
            </div>
        </div>
        <button class="btn-save" id="saveTeams">💾 Save Teams for This Month</button>
        <!-- Leaderboard -->
        <div id="leaderboard" style="margin-top:28px"></div>
        <!-- Category Winners -->
        <div id="detailedStats" style="margin-top:16px"></div>
    </div>
</div>
<script>
firebase.initializeApp({apiKey:"AIzaSyC8VwTY2i3kS41iy7FI_3ijCOFLV6LIwoA",authDomain:"action-az.firebaseapp.com",databaseURL:"https://action-az-default-rtdb.firebaseio.com",projectId:"action-az",storageBucket:"action-az.firebasestorage.app",messagingSenderId:"40939226263",appId:"1:40939226263:web:4cfc491a1e8008e86f55d2"});
const db=firebase.database();let currentDate=new Date(),people=[],logs={},currentMonthKey='',teamConfig={team1:{},team2:{},team3:{}};
const dk=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const mk=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
db.ref('salespeople').on('value',snap=>{const d=snap.val();people=d?Object.keys(d).map(k=>({id:k,name:d[k].name})):[];populateCaptains();loadTeams();});
db.ref('callLogs').on('value',snap=>{logs=snap.val()||{};renderStats();});
function populateCaptains(){[1,2,3].forEach(n=>{const el=document.getElementById(`captain${n}`);el.innerHTML='<option value="">Select captain…</option>'+people.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');});}
function addTeammate(n){const container=document.getElementById(`teammates${n}`);const div=document.createElement('div');div.className='tm-row';div.innerHTML=`<select class="teammate-select" data-team="${n}"><option value="">Select…</option>${people.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select><button class="tm-remove" onclick="this.parentElement.remove()">×</button>`;container.appendChild(div);}
function loadTeams(){currentMonthKey=mk(currentDate);db.ref(`monthlyCompetition/${currentMonthKey}`).once('value',snap=>{const data=snap.val();if(data){[1,2,3].forEach(n=>{const team=data[`team${n}`];if(team){document.getElementById(`captain${n}`).value=team.captain||'';document.getElementById(`teammates${n}`).innerHTML='';(team.members||[]).forEach(()=>addTeammate(n));const sels=document.querySelectorAll(`#teammates${n} .teammate-select`);(team.members||[]).forEach((id,i)=>{if(sels[i])sels[i].value=id;});}});teamConfig=data;}renderStats();});}
document.getElementById('saveTeams').onclick=()=>{const config={team1:{captain:document.getElementById('captain1').value,members:Array.from(document.querySelectorAll('#teammates1 .teammate-select')).map(s=>s.value).filter(v=>v)},team2:{captain:document.getElementById('captain2').value,members:Array.from(document.querySelectorAll('#teammates2 .teammate-select')).map(s=>s.value).filter(v=>v)},team3:{captain:document.getElementById('captain3').value,members:Array.from(document.querySelectorAll('#teammates3 .teammate-select')).map(s=>s.value).filter(v=>v)}};db.ref(`monthlyCompetition/${currentMonthKey}`).set(config);teamConfig=config;renderStats();};
function getMDates(date){const y=date.getFullYear(),m=date.getMonth(),last=new Date(y,m+1,0).getDate();return Array.from({length:last},(_,i)=>new Date(y,m,i+1));}
function getCalls(pid,d){const key=`${pid}_${dk(d)}`;const l=logs[key];return l?Object.values(l):[];}
function calcTeamStats(memberIds,dates){const s={revenue:0,reviews:0,totalCalls:0,callsSold:0,turnovers:0};memberIds.forEach(pid=>{dates.forEach(d=>{getCalls(pid,d).forEach(c=>{s.totalCalls++;if(c.jobSold){s.callsSold++;s.revenue+=parseFloat(c.amountSold)||0;}if(c.reviewCompleted)s.reviews++;if(c.turnoverAccepted)s.turnovers++;});});});s.closePercent=s.totalCalls>0?(s.callsSold/s.totalCalls*100):0;return s;}
const teamColors=['sc-t1','sc-t2','sc-t3'];
const teamAccents=['#93c5fd','#86efac','#fcd34d'];
function renderStats(){document.getElementById('monthYear').textContent=currentDate.toLocaleDateString('en-US',{month:'long',year:'numeric'}).toUpperCase();const dates=getMDates(currentDate);const teams=[{num:1,captain:teamConfig.team1?.captain,members:[teamConfig.team1?.captain,...(teamConfig.team1?.members||[])].filter(Boolean)},{num:2,captain:teamConfig.team2?.captain,members:[teamConfig.team2?.captain,...(teamConfig.team2?.members||[])].filter(Boolean)},{num:3,captain:teamConfig.team3?.captain,members:[teamConfig.team3?.captain,...(teamConfig.team3?.members||[])].filter(Boolean)}];const teamStats=teams.map(team=>{const stats=calcTeamStats(team.members,dates);const captainName=people.find(p=>p.id===team.captain)?.name||'No Captain';return{...team,...stats,captainName,points:0};}).filter(t=>t.members.length>0);if(!teamStats.length){document.getElementById('leaderboard').innerHTML='<div style="font-family:Oswald,sans-serif;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:20px">Set up teams above to start the competition</div>';document.getElementById('detailedStats').innerHTML='';return;}
['revenue','reviews','closePercent','turnovers'].forEach(cat=>{const sorted=[...teamStats].sort((a,b)=>b[cat]-a[cat]);const winner=teamStats.find(t=>t.num===sorted[0].num);if(winner)winner.points++;});teamStats.sort((a,b)=>b.points-a.points);
document.getElementById('leaderboard').innerHTML=`<div class="sec-label" style="margin-bottom:16px">Current Standings</div>`+teamStats.map((team,idx)=>{const colorClass=teamColors[team.num-1];const accent=teamAccents[team.num-1];return`<div class="standings-card ${colorClass}${idx===0?' leader':''}"><div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px"><div><div style="font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:4px">${idx===0?'👑 Leader':'#'+(idx+1)}</div><div class="sc-name">Team ${team.captainName.toUpperCase()}</div><div style="font-size:12px;color:var(--muted);margin-top:3px">${team.members.length} members</div></div><div style="text-align:right"><div class="sc-rev">$${Math.round(team.revenue).toLocaleString()}</div><span class="pts-badge">${team.points} pts</span></div></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--wire)"><div class="mini-stat"><div class="lbl">Revenue</div><div class="val" style="font-size:16px">$${Math.round(team.revenue/1000*10)/10}k</div></div><div class="mini-stat"><div class="lbl">Reviews</div><div class="val">${team.reviews}</div></div><div class="mini-stat"><div class="lbl">Close %</div><div class="val">${team.closePercent.toFixed(1)}%</div></div><div class="mini-stat"><div class="lbl">Turnovers</div><div class="val">${team.turnovers}</div></div></div></div>`;}).join('');
const cats=[{key:'revenue',label:'Revenue',fmt:v=>'$'+Math.round(v).toLocaleString()},{key:'reviews',label:'Reviews',fmt:v=>v},{key:'closePercent',label:'Close %',fmt:v=>v.toFixed(1)+'%'},{key:'turnovers',label:'Turnovers',fmt:v=>v}];document.getElementById('detailedStats').innerHTML=`<div class="sec-label" style="margin-top:24px;margin-bottom:16px">Category Winners</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--wire)">`+cats.map(cat=>{const sorted=[...teamStats].sort((a,b)=>b[cat.key]-a[cat.key]);const winner=sorted[0];const colorClass=teamColors[winner.num-1];const accent=teamAccents[winner.num-1];return`<div class="cat-card"><div class="cat-label">${cat.label}</div><div class="cat-val" style="color:${accent}">${cat.fmt(winner[cat.key])}</div><div class="cat-team" style="color:${accent}">Team ${winner.captainName}</div></div>`;}).join('')+'</div>';}
document.getElementById('prevMonth').onclick=()=>{currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()-1,1);loadTeams();};
document.getElementById('nextMonth').onclick=()=>{currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+1,1);loadTeams();};
</script>
</body>
</html>
